  <!-- 🔧 Inicialización robusta de AdminMenu (reintenta hasta que Angular pinte el sidebar) -->
  <script>
    (function initAdminMenuAfterAngular(attempts) {
      function tryInit() {
        if (!window.jQuery) return false;                 // jQuery aún no listo
        if (typeof $.fn.AdminMenu !== 'function') return false; // sidebarmenu.js aún no definió el plugin

        var $nav = $('#sidebarnav');                      // tu <ul id="sidebarnav">
        if (!$nav.length) return false;                   // Angular todavía no lo renderizó

        try {
          // ⚠️ Bootstrap 4/5 usan "show" en lugar de "in". Ajustamos la clase abierta:
          $nav.AdminMenu({
            collapseInClass: 'show',   // en lugar de 'in'
            // Opcionales (van con los defaults):
            // toggle: true,
            // preventDefault: true,
            // activeClass: 'active',
            // collapseClass: 'collapse',
            // collapsingClass: 'collapsing',
            // triggerElement: 'a',
            // parentTrigger: 'li',
            // subMenu: 'ul'
          });
          return true;
        } catch (e) {
          console.error('[AdminPro] Error inicializando AdminMenu:', e);
          return false;
        }
      }

      if (!tryInit() && attempts > 0) {
        setTimeout(function () { initAdminMenuAfterAngular(attempts - 1); }, 150);
      }
    })(20); // 20 intentos x 150ms ≈ 3s de ventana de render Angular
  </script>

<script>
  // Inicializá con delegación o después de que Angular ya renderizó el UL
  $(document).on('click', '#themecolors a', function(e){
    e.preventDefault();
    var cur = $(this).attr('data-theme');
    $('#theme').attr('href', './assets/css/colors/' + cur + '.css');
    $('#themecolors a').removeClass('working');
    $(this).addClass('working');
    try { localStorage.setItem('adminpro-theme', cur); } catch(e){}
  });

  // Restaurar guardado
  $(function(){
    var saved = localStorage.getItem('adminpro-theme');
    if (saved) {
      $('#theme').attr('href', './assets/css/colors/' + saved + '.css');
      $('#themecolors a[data-theme="'+saved+'"]').addClass('working');
    }
  });
</script>
