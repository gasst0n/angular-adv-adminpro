<!-- Left Sidebar -->
<aside class="left-sidebar">
  <div class="scroll-sidebar">

    <!-- Sidebar navigation -->
    <nav class="sidebar-nav">
      <ul id="sidebarnav">

        <!-- PERFIL -->
        <li class="user-profile">
          <!-- Este anchor solo expande/cierra el submenú -->
          <a class="has-arrow waves-effect waves-dark"
             href="javascript:void(0)"
             aria-expanded="false">
            <img src="assets/images/users/profile.png" alt="user" />
            <span class="hide-menu">Gastón Godoy</span>
          </a>

          <!-- Submenú del perfil -->
          <ul aria-expanded="false" class="collapse">
            <li><a href="javascript:void(0)">My Profile</a></li>
            <li><a href="javascript:void(0)">My Balance</a></li>
            <li><a href="javascript:void(0)">Inbox</a></li>

            <li>
              <a
                routerLink="/dashboard/account-settings"
                routerLinkActive="active"
                [routerLinkActiveOptions]="{ exact: true }">
                Account Settings
              </a>
            </li>

            <li><a routerLink="/login">Logout</a></li>
          </ul>
        </li>

        <!-- Divider -->
        <li class="nav-devider"></li>
        <li class="nav-small-cap">PERSONAL</li>

        <!-- MENÚ DINÁMICO -->
        <li *ngFor="let item of menuItems"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: false }">

          <!-- Toggle del submenu -->
          <a class="has-arrow waves-effect waves-dark"
             href="javascript:void(0)"
             aria-expanded="false">
            <i class="{{item.icono}}"></i>
            <span class="hide-menu">
              {{ item.titulo }}
            </span>
          </a>

          <!-- Submenú dinámico -->
          <ul aria-expanded="false" class="collapse">
            <li *ngFor="let sub of item.submenu">
              <a
                [routerLink]="sub.url"
                routerLinkActive="active"
                [routerLinkActiveOptions]="{ exact: true }">
                {{ sub.titulo }}
              </a>
            </li>
          </ul>
        </li>

      </ul>
    </nav>
    <!-- End Sidebar navigation -->

  </div>
</aside>
