<div class="row">

  <!-- 🔹 COLUMNA FORMULARIO -->
  <div class="col-lg-6">
    <div class="card">
      <div class="card-body">

        <h4 class="card-title">Mi perfil de usuario</h4>
        <h6 class="card-subtitle">Ajustes</h6>

        <!-- 🔥 IMPORTANTE: usar ngSubmit (Angular) -->
        <form 
          class="form p-t-20" 
          [formGroup]="perfilForm" 
          (ngSubmit)="actualizarPerfil()">

          <!-- 🔹 NOMBRE -->
          <div class="form-group">
            <label for="nombre">Usuario</label>

            <div class="input-group">
              <div class="input-group-addon">
                <i class="ti-user"></i>
              </div>

              <input 
                type="text"
                id="nombre"
                class="form-control"
                placeholder="Ingrese su usuario"
                formControlName="nombre">
            </div>
          </div>

          <!-- 🔹 EMAIL -->
          <div class="form-group">
            <label for="email">Email</label>

            <div class="input-group">
              <div class="input-group-addon">
                <i class="ti-email"></i>
              </div>

              <input 
                type="email"
                id="email"
                class="form-control"
                placeholder="Ingrese su email"
                formControlName="email"
                [readOnly]="usuario.google">
            </div>
          </div>

          <!-- 🔥 BOTÓN GUARDAR -->
          <!-- 👉 ÚNICO submit del formulario -->
          <button 
            type="submit"
            class="btn btn-success btn-block waves-effect waves-light m-r-10"
            [disabled]="perfilForm.invalid">
            Aceptar
          </button>

          <!-- 🔥 BOTÓN CANCELAR -->
          <!-- 👉 IMPORTANTE: type="button" para NO disparar submit -->
          <button 
            type="button"
            class="btn btn-inverse btn-block waves-effect waves-light">
            Cancelar
          </button>

        </form>
      </div>
    </div>
  </div>

  <!-- 🔹 COLUMNA AVATAR -->
  <div class="col-lg-6">
    <div class="card">
      <div class="card-body">

        <h4 class="card-title">Avatar</h4>
        <h6 class="card-subtitle">Imagen del usuario</h6>

<!-- Contenedor -->
<div class="row justify-content-center text-center">

  <!-- ⬇️ Cuando NO hay imgTemp: una sola columna centrada -->
  <ng-container *ngIf="!imgTemp; else conPreview">
    <div class="col-12 d-flex justify-content-center">
      <div class="preview-box">
        <img [src]="usuario.imagenURL" class="img-avatar" alt="Avatar Usuario">
        <p class="mt-2"><strong>Imagen actual</strong></p>
      </div>
    </div>
  </ng-container>

  <!-- ⬇️ Cuando SÍ hay imgTemp: dos columnas -->
  <ng-template #conPreview>
    <div class="col-12 col-md-6 d-flex justify-content-center mb-3 mb-md-0">
      <div class="preview-box">
        <img [src]="usuario.imagenURL" class="img-avatar" alt="Avatar Usuario">
        <p class="mt-2"><strong>Imagen actual</strong></p>
      </div>
    </div>

    <div class="col-12 col-md-6 d-flex justify-content-center">
      <div class="preview-box">
        <img [src]="imgTemp" class="img-avatar" alt="Preview Imagen">
        <p class="mt-2"><strong>Imagen nueva</strong></p>
      </div>
    </div>
  </ng-template>
</div>

<br>

        <!-- 🔹 INPUT FILE -->
        <input type="file" (change)="cambiarImagen($event)">

        <br><br>

        <!-- 🔹 BOTÓN CAMBIAR IMAGEN -->
        <button 
          type="button"
          class="btn btn-success btn-block waves-effect waves-light m-r-10" [disabled]="!imagenSubir" (click)="subirImagen()">
          Cambiar Imagen
        </button>

      </div>
    </div>
  </div>

</div>
