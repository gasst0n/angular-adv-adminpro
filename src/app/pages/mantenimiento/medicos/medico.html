<div class="row">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-body">
        <h4 class="card-title">Nuevo Medico</h4>
        <h6 class="card-subtitle">Actualizar información</h6>
        <form class="form-horizontal p-t-20" [formGroup]="medicoForm" (ngSubmit)="guardarMedico()">
          <div class="form-group row" *ngIf="medicoSeleccionado">
            <label for="exampleInputuname3" class="col-sm-3 control-label">Foto</label>
            <div class="col-sm-9">
              <div class="input-group">
                <img
                  *ngIf="medicoSeleccionado"
                  [src]="medicoSeleccionado.img | imagen: 'medicos'"
                  class="w50"
                  alt="Foto del médico"
                />
              </div>
            </div>
          </div>

          <div class="form-group row">
            <label for="exampleInputuname3" class="col-sm-3 control-label">Nombre</label>
            <div class="col-sm-9">
              <div class="input-group">
                <div class="input-group-addon"><i class="ti-user"></i></div>
                <input
                  type="text"
                  formControlName="nombre"
                  class="form-control"
                  id="exampleInputuname3"
                  placeholder="Nombre del medico"
                />
              </div>
            </div>
          </div>
          <div class="form-group row">
            <label for="exampleInputEmail3" class="col-sm-3 control-label">Hospital</label>
            <div class="col-sm-9">
              <div class="input-group">
                <select
                  class="form-control"
                  formControlName="hospital"
                  *ngIf="hospitales.length > 0"
                >
                  <option value="" disabled hidden>Seleccione un hospital</option>

                  <option *ngFor="let hospital of hospitales" [value]="hospital._id">
                    {{ hospital.nombre }}
                  </option>
                </select>
              </div>
            </div>
          </div>
          <div class="form-group row m-b-0">
            <div class="offset-sm-3 col-sm-9">
              <button
                type="submit"
                [disabled]="medicoForm.invalid"
                class="btn btn-success waves-effect waves-light"
              >
                <i class="fa fa-save"></i> Guardar cambios
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="col-md-6 animated fadeIn fast" *ngIf="hospitalSeleccionado">
    <div class="card">
      <div class="card-body">
        <h4 class="card-title">Hospital</h4>
        <h6 class="card-subtitle">{{ hospitalSeleccionado.nombre }}</h6>
        <img [src]="hospitalSeleccionado.img | imagen: 'hospitales'" class="w100" />
      </div>
    </div>
  </div>
</div>
